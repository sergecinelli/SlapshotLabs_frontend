<div class="page-content">
  @if (isLoading) {
    <app-loading-spinner message="Loading profile data..." size="sm" />
  } @else {
    <div class="page-sections">
      <section class="profile-section">
        <div class="section-header-row">
          <span class="material-symbols-rounded section-icon">person</span>
          <div class="section-header-text">
            <h2 class="section-title">Profile Settings</h2>
            <p class="section-subtitle">Update your personal information and account details.</p>
          </div>
          <app-button
            materialIcon="lock_reset"
            [bg]="'item_selected'"
            [bghover]="'item_hover'"
            [br]="'border'"
            [color]="'text_primary'"
            [colorhover]="'text_primary'"
            [haveContent]="true"
            (clicked)="onResetPassword()"
            tooltip="Reset password via email"
          >
            Reset Password
          </app-button>
        </div>

        <!-- Error Message -->
        @if (errorMessage) {
          <div class="dashboard-error">
            <div class="dashboard-error-message">{{ errorMessage }}</div>
          </div>
        }

        <!-- Success Message -->
        @if (successMessage) {
          <div class="dashboard-success">
            <div class="dashboard-success-message">{{ successMessage }}</div>
          </div>
        }

        <div class="dashboard-card">
          <div class="dashboard-card-content">
            <form [formGroup]="profileForm" (ngSubmit)="onSave()" class="profile-form">
              <div class="profile-form-grid">
                <app-form-field
                  label="Email Address"
                  [required]="true"
                  [error]="getErrorMessage('email')"
                >
                  <input
                    formControlName="email"
                    type="email"
                    autocomplete="email"
                    placeholder="Enter your email"
                  />
                </app-form-field>

                <app-form-field
                  label="First Name"
                  [required]="true"
                  [error]="getErrorMessage('firstName')"
                >
                  <input
                    formControlName="firstName"
                    type="text"
                    autocomplete="given-name"
                    placeholder="First name"
                  />
                </app-form-field>

                <app-form-field
                  label="Last Name"
                  [required]="true"
                  [error]="getErrorMessage('lastName')"
                >
                  <input
                    formControlName="lastName"
                    type="text"
                    autocomplete="family-name"
                    placeholder="Last name"
                  />
                </app-form-field>

                <app-form-field label="Phone Number" [error]="getErrorMessage('phoneNumber')">
                  <input
                    formControlName="phoneNumber"
                    type="tel"
                    autocomplete="tel"
                    placeholder="Enter your phone number"
                  />
                </app-form-field>

                <app-form-field label="Country" [error]="getErrorMessage('country')">
                  <input
                    formControlName="country"
                    type="text"
                    placeholder="Enter your country"
                  />
                </app-form-field>

                <app-form-field label="City" [error]="getErrorMessage('city')">
                  <input formControlName="city" type="text" placeholder="Enter your city" />
                </app-form-field>

                <app-form-field label="Street Address" [error]="getErrorMessage('street')">
                  <input
                    formControlName="street"
                    type="text"
                    placeholder="Enter your street address"
                  />
                </app-form-field>

                <app-form-field label="Postal Code" [error]="getErrorMessage('postalCode')">
                  <input
                    formControlName="postalCode"
                    type="text"
                    placeholder="Enter your postal code"
                  />
                </app-form-field>
              </div>

              <!-- Save Button -->
              <div class="profile-form-actions">
                <app-button-loading
                  [isLoading]="isSaving"
                  [isDisabled]="profileForm.invalid"
                  type="submit"
                  [bg]="'primary'"
                  [bghover]="'primary_dark'"
                  [color]="'white'"
                  [colorhover]="'white'"
                  [opacity]="profileForm.invalid || isSaving ? 0.5 : 1"
                  [opacityhover]="1"
                  [width]="'auto'"
                  [rounded]="false"
                  tooltip="Save changes"
                >
                  {{ isSaving ? 'Saving...' : 'Save Changes' }}
                </app-button-loading>
              </div>
            </form>
          </div>
        </div>
      </section>
    </div>
  }
</div>
