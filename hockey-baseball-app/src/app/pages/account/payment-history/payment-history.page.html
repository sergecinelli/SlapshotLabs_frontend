<div class="page-content">
  @if (!isLoading()) {
    <div class="stats-row">
      <div class="stat-card">
        <span class="material-symbols-rounded stat-icon transactions-icon">receipt_long</span>
        <span class="stat-label">Total Transactions</span>
        <span class="stat-value">{{ totalTransactions() }}</span>
      </div>
      <div class="stat-card">
        <span class="material-symbols-rounded stat-icon paid-icon">attach_money</span>
        <span class="stat-label">Total Paid</span>
        <span class="stat-value">{{ totalPaid() | currencyFormat }}</span>
      </div>
      <div class="stat-card">
        <span class="material-symbols-rounded stat-icon average-icon">functions</span>
        <span class="stat-label">Average Amount</span>
        <span class="stat-value">{{ averageAmount() | currencyFormat }}</span>
      </div>
    </div>
  }

  <app-data-table
    [columns]="columns"
    [data]="transactions()"
    [actions]="actions"
    [loading]="isLoading()"
    loadingMessage="Loading transactions..."
    emptyMessage="No transactions found"
    (actionClick)="onActionClick($event)"
  />
</div>
