<div class="page-content">
  @if (isLoading()) {
    <app-loading-spinner message="Loading transactions..." size="sm" />
  } @else {
    <div class="stats-row">
      <div class="stat-card">
        <span class="material-symbols-rounded stat-icon transactions-icon">receipt_long</span>
        <span class="stat-label">Total Transactions</span>
        <span class="stat-value">{{ totalCount() }}</span>
      </div>
      <div class="stat-card">
        <span class="material-symbols-rounded stat-icon paid-icon">attach_money</span>
        <span class="stat-label">Page Total Paid</span>
        <span class="stat-value">{{ totalPaid() | currencyFormat }}</span>
      </div>
      <div class="stat-card">
        <span class="material-symbols-rounded stat-icon average-icon">functions</span>
        <span class="stat-label">Page Average Amount</span>
        <span class="stat-value">{{ averageAmount() | currencyFormat }}</span>
      </div>
    </div>

    <div class="table-section">
      <app-data-table
        [columns]="columns"
        [data]="transactions()"
        [actions]="actions"
        [scrollable]="true"
        emptyMessage="No transactions found"
      />
    </div>

    <app-pagination
      [currentPage]="currentPage()"
      [totalPages]="totalPages()"
      (pageChange)="goToPage($event)"
    />
  }
</div>
