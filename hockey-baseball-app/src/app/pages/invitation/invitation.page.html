@let isLoadingValue = isLoading();

<app-auth-layout>
  <div card class="card">
    <div class="card-columns">
      <div class="form-column">
        <div class="auth-icon">
          <span class="material-symbols-rounded">mail</span>
        </div>
        <h1 class="title">You've been invited to join the team</h1>
        <p class="description">
          Accept this invitation to access your team's dashboard — view analytics, schedules, video
          highlights, player stats, and more.
        </p>
        <div class="button-row">
          <app-button-loading
            [isLoading]="isLoadingValue"
            [bg]="'primary'"
            [bghover]="'primary_dark'"
            [color]="'white'"
            [colorhover]="'white'"
            [opacity]="1"
            [opacityhover]="1"
            [width]="'auto'"
            [rounded]="false"
            [materialIcon]="'how_to_reg'"
            [haveContent]="true"
            (clicked)="acceptInvitation()"
          >
            {{ isLoadingValue ? 'ACCEPTING...' : 'ACCEPT INVITE' }}
          </app-button-loading>
        </div>
      </div>

      <div class="features-column">
        <app-list [items]="features" title="What you'll get access to" [alignTop]="true" />
      </div>
    </div>
  </div>
</app-auth-layout>
