@let analysesValue = analyses();
@let loadingValue = loading();

<div class="page-content" [appVisibilityMap]="visibilityByRoleMap">
  <div class="action-buttons-row" role-visibility-name="create-analysis-button">
    <app-button-loading
      materialIcon="add"
      [bg]="'primary'"
      [bghover]="'primary'"
      [color]="'white'"
      [colorhover]="'white'"
      [haveContent]="true"
      [isLoading]="isCreateLoading()"
      (clicked)="onCreateAnalysis()"
    >
      Create Team Analysis
    </app-button-loading>
  </div>

  <app-data-table
    [columns]="tableColumns"
    [data]="analysesValue"
    [actions]="tableActions"
    [loading]="loadingValue"
    emptyMessage="No analyses found for this team"
    (actionClick)="onTableAction($event)"
  ></app-data-table>
</div>
