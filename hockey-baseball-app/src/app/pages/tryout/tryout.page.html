@let entriesValue = entries();
@let loadingValue = loading();
@let activeTabIndexValue = activeTabIndex();

<ng-template appBreadcrumbCenter>
  <app-tabs-slider
    [items]="tabItems"
    [activeTabIndex]="activeTabIndexValue"
    (selected)="onTabChange($event)"
  ></app-tabs-slider>
</ng-template>

<ng-template appBreadcrumbActions>
  <div [appVisibilityMap]="visibilityByRoleMap" style="display: contents">
    <app-button-loading
      materialIcon="add"
      [bg]="'primary'"
      [bghover]="'primary'"
      [color]="'white'"
      [colorhover]="'white'"
      [haveContent]="true"
      (clicked)="openAddModal()"
      role-visibility-name="add-player-button"
    >
      Add Player
    </app-button-loading>
  </div>
</ng-template>

<div class="page-content" [appVisibilityMap]="visibilityByRoleMap">
  <app-data-table
    [columns]="tableColumns"
    [data]="entriesValue"
    [actions]="tableActions"
    [loading]="loadingValue"
    emptyMessage="No tryout entries found"
    (actionClick)="onActionClick($event)"
  ></app-data-table>
</div>
