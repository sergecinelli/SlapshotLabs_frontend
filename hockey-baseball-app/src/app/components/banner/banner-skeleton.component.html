<div class="sk-banner-container">
  @for (item of [].constructor(skeletonCount); track $index) {
    <div class="sk-card">
      <div class="sk-header">
        <div class="sk-header-left">
          <div class="sk-chip"></div>
          <div class="sk-venue-info">
            <div class="sk-line sk-arena"></div>
            <div class="sk-line sk-rink"></div>
          </div>
        </div>
        <div class="sk-header-right">
          <div class="sk-period"></div>
        </div>
      </div>
      <div class="sk-teams">
        <div class="sk-team-row">
          <div class="sk-logo"></div>
          <div class="sk-team-name"></div>
          <div class="sk-score"></div>
        </div>
        <div class="sk-team-row">
          <div class="sk-logo"></div>
          <div class="sk-team-name"></div>
          <div class="sk-score"></div>
        </div>
      </div>
    </div>
  }
</div>
