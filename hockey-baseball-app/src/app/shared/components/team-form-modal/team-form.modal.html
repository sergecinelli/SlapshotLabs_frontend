<div class="team-form-modal">
  <div class="modal-content">
    @if (isLoading) {
      <div class="loading-container">
        <app-loading-spinner message="Loading options..." size="sm" />
      </div>
    }

    @if (!isLoading) {
      <form [formGroup]="teamForm" class="team-form">
        <div class="form-section">
          <app-section-header title="Team Information" />

          <div class="form-row">
            <app-form-field label="Team Name" [required]="true" [error]="getErrorMessage('name')">
              <input formControlName="name" placeholder="Enter team name" />
            </app-form-field>
            <app-form-field label="Group" [required]="true" [error]="getErrorMessage('group')">
              <app-custom-autocomplete
                formControlName="group"
                placeholder="Enter or select group"
                [options]="groupOptions"
              />
            </app-form-field>
          </div>

          <div class="form-row">
            <app-form-field label="Level" [required]="true" [error]="getErrorMessage('level')">
              <app-custom-select formControlName="level" [options]="levelOptions" />
            </app-form-field>
            <app-form-field
              label="Division"
              [required]="true"
              [error]="getErrorMessage('division')"
            >
              <app-custom-select formControlName="division" [options]="divisionOptions" />
            </app-form-field>
          </div>

          <div class="form-row">
            <app-form-field label="City" [error]="getErrorMessage('city')">
              <input formControlName="city" placeholder="Enter city" />
            </app-form-field>
            <app-form-field label="Abbreviation" [error]="getErrorMessage('abbreviation')">
              <input formControlName="abbreviation" placeholder="Enter abbreviation" />
            </app-form-field>
          </div>

          <app-section-header title="Team Logo" />

          <div class="form-row">
            <div class="form-field logo-picker-container">
              <input
                type="file"
                accept="image/jpeg,image/jpg,image/png,image/gif,image/webp"
                (change)="onFileSelected($event)"
                style="display: none"
                #fileInput
              />
              <div
                class="logo-preview-area"
                (dragover)="onDragOver($event)"
                (dragleave)="onDragLeave($event)"
                (drop)="onDrop($event)"
                [class.dragging]="isDragging"
              >
                @if (!imagePreview) {
                  <button type="button" class="upload-placeholder" (click)="triggerFileInput()">
                    <span class="material-symbols-rounded upload-icon">cloud_upload</span>
                    <span class="upload-text">{{
                      isDragging ? 'Drop image here' : 'Click or drag to upload logo'
                    }}</span>
                    <span class="upload-hint">JPEG, PNG, GIF, WebP (max 5MB)</span>
                  </button>
                }
                @if (imagePreview) {
                  <div class="image-preview" [class.loading]="isImageLoading">
                    <img
                      [src]="imagePreview"
                      alt="Team logo preview"
                      class="preview-image"
                      [style.opacity]="isImageLoading ? '0' : '1'"
                      (load)="onImageLoad()"
                      (error)="onImageError()"
                    />
                    @if (isImageLoading) {
                      <div class="image-loading-overlay">
                        <app-loading-spinner size="sm" />
                      </div>
                    }
                    @if (!isImageLoading) {
                      <button type="button" class="remove-image-btn" (click)="removeImage()">
                        <span class="material-symbols-rounded">close</span>
                      </button>
                    }
                  </div>
                }
              </div>
              @if (imageError) {
                <div class="image-error">
                  <span class="material-symbols-rounded error-icon">error</span>
                  <span>{{ imageError }}</span>
                </div>
              }
            </div>
          </div>
        </div>
      </form>
    }
  </div>

  <div class="modal-actions">
    <app-button
      [bg]="'background'"
      [bghover]="'item_hover'"
      [br]="'border'"
      [color]="'text_primary'"
      [colorhover]="'text_primary'"
      [haveContent]="true"
      materialIcon="cancel"
      (clicked)="onCancel()"
    >
      Cancel
    </app-button>
    <app-button-loading
      [isLoading]="isSubmitting()"
      [isDisabled]="teamForm.invalid"
      materialIcon="save"
      [bg]="isEditMode ? 'orange' : 'green'"
      [bghover]="isEditMode ? 'orange' : 'green'"
      [color]="'white'"
      [colorhover]="'white'"
      [haveContent]="true"
      (clicked)="onSubmit()"
    >
      {{ isEditMode ? 'Update Team' : 'Add Team' }}
    </app-button-loading>
  </div>
</div>
