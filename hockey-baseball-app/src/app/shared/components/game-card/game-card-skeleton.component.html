@let skeletonCountValue = skeletonCount();

<div class="sk-grid">
  @for (item of [].constructor(skeletonCountValue); track $index) {
    <div class="sk-card">
      <!-- Header -->
      <div class="sk-header">
        <div class="sk-header-left">
          <div class="sk-chip"></div>
          <div class="sk-game-type"></div>
        </div>
        <div class="sk-date-group">
          <div class="sk-date"></div>
          <div class="sk-time"></div>
        </div>
      </div>
      <!-- Scoreboard -->
      <div class="sk-scoreboard">
        <div class="sk-team sk-team-home">
          <div class="sk-team-identity">
            <div class="sk-logo"></div>
            <div class="sk-team-text">
              <div class="sk-name"></div>
              <div class="sk-sub"></div>
            </div>
          </div>
          <div class="sk-goalie"></div>
        </div>
        <div class="sk-center">
          <div class="sk-score"></div>
          <div class="sk-dash"></div>
          <div class="sk-score"></div>
        </div>
        <div class="sk-team sk-team-away">
          <div class="sk-team-identity">
            <div class="sk-logo"></div>
            <div class="sk-team-text">
              <div class="sk-name"></div>
              <div class="sk-sub"></div>
            </div>
          </div>
          <div class="sk-goalie"></div>
        </div>
      </div>
      <!-- Footer -->
      <div class="sk-footer">
        <div class="sk-venue-group">
          <div class="sk-venue-icon"></div>
          <div class="sk-venue-details">
            <div class="sk-venue-name"></div>
            <div class="sk-venue-location"></div>
          </div>
        </div>
        <div class="sk-actions"></div>
      </div>
    </div>
  }
</div>
