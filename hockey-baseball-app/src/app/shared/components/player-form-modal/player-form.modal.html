<div class="player-form-modal">
  <div class="modal-content">
    @if (isLoading) {
      <div class="loading-container">
        <app-loading-spinner message="Loading form data..." size="sm" />
      </div>
    }
    @if (!isLoading) {
      <form [formGroup]="playerForm" class="player-form">
        <!-- Team Information Section -->
        <div class="form-section">
          <app-section-header title="Team Information" />
          <div class="form-row">
            <app-form-field label="Team" [required]="true" [error]="getErrorMessage('team')">
              <app-custom-select
                formControlName="team"
                [options]="teamOptions"
                [searchable]="true"
              />
            </app-form-field>
          </div>
        </div>
        <!-- Personal Information Section -->
        <div class="form-section">
          <app-section-header title="Personal Information" />
          <div class="form-row">
            <app-form-field label="Number" [error]="getErrorMessage('jerseyNumber')">
              <input
                type="number"
                formControlName="jerseyNumber"
                placeholder="Enter jersey number"
              />
            </app-form-field>
            <app-form-field
              label="First Name"
              [required]="true"
              [error]="getErrorMessage('firstName')"
            >
              <input formControlName="firstName" placeholder="Enter first name" />
            </app-form-field>
            <app-form-field
              label="Last Name"
              [required]="true"
              [error]="getErrorMessage('lastName')"
            >
              <input formControlName="lastName" placeholder="Enter last name" />
            </app-form-field>
            <app-form-field label="Birth Year" [error]="getErrorMessage('birthYear')">
              <input type="number" formControlName="birthYear" placeholder="Enter birth year" />
            </app-form-field>
          </div>
          <app-form-field label="Position" [error]="getErrorMessage('position')">
            <app-card-grid [columns]="positionOptions.length">
              @for (pos of positionOptions; track pos.value) {
                <app-card-grid-item
                  [selected]="playerForm.get('position')?.value === pos.value"
                  (select)="onPositionSelected(pos.value)"
                >
                  {{ pos.label }}
                </app-card-grid-item>
              }
            </app-card-grid>
          </app-form-field>
        </div>
        <!-- Physical Information Section -->
        <div class="form-section">
          <app-section-header title="Physical Information" />
          <div class="form-row">
            <app-form-field label="Height" [error]="getErrorMessage('height')">
              <input formControlName="height" placeholder="e.g., 6'2&quot;" />
            </app-form-field>
            <app-form-field label="Weight" [error]="getErrorMessage('weight')">
              <input type="number" formControlName="weight" placeholder="Enter weight in lbs" />
            </app-form-field>
            <app-form-field label="Birthplace" [error]="getErrorMessage('birthplace')">
              <input formControlName="birthplace" placeholder="Country Born In" />
            </app-form-field>
          </div>
          <app-form-field label="Shoots (R/L)" [error]="getErrorMessage('shoots')">
            <app-card-grid [columns]="shootsOptions.length">
              @for (opt of shootsOptions; track opt.value) {
                <app-card-grid-item
                  [selected]="playerForm.get('shoots')?.value === opt.value"
                  (select)="onShootsSelected(opt.value)"
                >
                  {{ opt.label }}
                </app-card-grid-item>
              }
            </app-card-grid>
          </app-form-field>
        </div>
        <!-- Address Section -->
        <div class="form-section">
          <app-section-header title="Address" />
          <div class="form-row">
            <app-form-field label="Country" [error]="getErrorMessage('addressCountry')">
              <input formControlName="addressCountry" placeholder="Enter country" />
            </app-form-field>
            <app-form-field label="State/Province" [error]="getErrorMessage('addressRegion')">
              <input formControlName="addressRegion" placeholder="Enter state or province" />
            </app-form-field>
            <app-form-field label="City" [error]="getErrorMessage('addressCity')">
              <input formControlName="addressCity" placeholder="Enter city" />
            </app-form-field>
          </div>
          <div class="form-row">
            <app-form-field label="Street Address" [error]="getErrorMessage('addressStreet')">
              <input formControlName="addressStreet" placeholder="Enter street address" />
            </app-form-field>
            <app-form-field label="Postal Code" [error]="getErrorMessage('addressPostalCode')">
              <input formControlName="addressPostalCode" placeholder="Enter postal code" />
            </app-form-field>
          </div>
        </div>
        <!-- Player Biography Section -->
        <div class="form-section">
          <app-section-header title="Player Biography" />
          <div class="form-row">
            <app-form-field
              class="full-width"
              label="Player Biography"
              [error]="getErrorMessage('playerBiography')"
            >
              <textarea
                formControlName="playerBiography"
                rows="4"
                placeholder="Enter player biography and background information"
              ></textarea>
            </app-form-field>
          </div>
        </div>
        <!-- Analysis Section -->
        <div class="form-section">
          <app-section-header title="Analysis" />
          <div class="form-row">
            <app-form-field
              class="full-width"
              label="Analysis"
              [error]="getErrorMessage('analysis')"
            >
              <textarea
                formControlName="analysis"
                rows="3"
                placeholder="Enter analysis (optional)"
              ></textarea>
            </app-form-field>
          </div>
        </div>
      </form>
    }
  </div>

  <div class="modal-actions">
    <app-button
      [bg]="'background'"
      [bghover]="'item_hover'"
      [br]="'border'"
      [color]="'text_primary'"
      [colorhover]="'text_primary'"
      [haveContent]="true"
      materialIcon="cancel"
      (clicked)="onCancel()"
    >
      Cancel
    </app-button>
    <app-button-loading
      [isLoading]="isSubmitting()"
      [isDisabled]="isLoading || playerForm.invalid"
      materialIcon="save"
      [bg]="isEditMode ? 'orange' : 'green'"
      [bghover]="isEditMode ? 'orange' : 'green'"
      [color]="'white'"
      [colorhover]="'white'"
      [haveContent]="true"
      (clicked)="onSubmit()"
    >
      {{ isEditMode ? 'Update Player' : 'Add Player' }}
    </app-button-loading>
  </div>
</div>
