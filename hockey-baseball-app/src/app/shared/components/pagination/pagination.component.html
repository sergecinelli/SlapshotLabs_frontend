@let currentPageValue = currentPage();
@let totalPagesValue = totalPages();
@let pagesValue = pages();

@if (totalPagesValue > 1) {
  <nav class="pagination">
    <button
      class="pagination-btn"
      [disabled]="currentPageValue === 1"
      (click)="goToPage(1)"
      aria-label="First page"
    >
      <span class="material-symbols-rounded">first_page</span>
    </button>

    <button
      class="pagination-btn"
      [disabled]="currentPageValue === 1"
      (click)="goToPage(currentPageValue - 1)"
      aria-label="Previous page"
    >
      <span class="material-symbols-rounded">chevron_left</span>
    </button>

    @for (page of pagesValue; track $index) {
      @if (page === '...') {
        <span class="pagination-ellipsis">...</span>
      } @else {
        <button
          class="pagination-btn pagination-number"
          [class.active]="page === currentPageValue"
          (click)="goToPage(page)"
          [attr.aria-label]="'Page ' + page"
          [attr.aria-current]="page === currentPageValue ? 'page' : null"
        >
          {{ page }}
        </button>
      }
    }

    <button
      class="pagination-btn"
      [disabled]="currentPageValue === totalPagesValue"
      (click)="goToPage(currentPageValue + 1)"
      aria-label="Next page"
    >
      <span class="material-symbols-rounded">chevron_right</span>
    </button>

    <button
      class="pagination-btn"
      [disabled]="currentPageValue === totalPagesValue"
      (click)="goToPage(totalPagesValue)"
      aria-label="Last page"
    >
      <span class="material-symbols-rounded">last_page</span>
    </button>
  </nav>
}
