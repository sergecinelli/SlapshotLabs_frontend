<div class="analysis-modal">
  <div class="modal-content">
    <form [formGroup]="analysisForm" class="analysis-form">
      <div class="form-section">
        <app-section-header title="Analysis Details" />
        <div class="form-row">
          @if (isEntityLocked()) {
            <app-form-field
              label="Selected Player"
              [readonly]="true"
              [readonlyValue]="selectedPlayerLabel()"
            />
          } @else {
            <app-form-field
              label="Select Player"
              [required]="true"
              [error]="getErrorMessage('entityId')"
            >
              <app-custom-select
                formControlName="entityId"
                placeholder="Search player..."
                [searchable]="true"
                searchPlaceholder="Search by name..."
                [optionGroups]="playerOptionGroups()"
              />
            </app-form-field>
          }
        </div>

        <div class="form-row">
          <app-form-field label="Title" [required]="true" [error]="getErrorMessage('title')">
            <input formControlName="title" placeholder="Enter title" />
          </app-form-field>
        </div>

        <div class="form-row">
          <app-form-field label="Author" [required]="true" [error]="getErrorMessage('author')">
            <input formControlName="author" placeholder="Enter author name" />
          </app-form-field>
        </div>

        <div class="form-row">
          <app-form-field label="Analysis" [required]="true" [error]="getErrorMessage('analysis')">
            <textarea formControlName="analysis" rows="6" placeholder="Enter analysis"></textarea>
          </app-form-field>
        </div>
      </div>
    </form>
  </div>

  <div class="modal-actions">
    <app-button
      [bg]="'background'"
      [bghover]="'item_hover'"
      [br]="'border'"
      [color]="'text_primary'"
      [colorhover]="'text_primary'"
      [haveContent]="true"
      materialIcon="cancel"
      (clicked)="onCancel()"
    >
      Cancel
    </app-button>
    <app-button-loading
      [isLoading]="isSubmitting()"
      [isDisabled]="analysisForm.invalid"
      materialIcon="save"
      [bg]="isEditMode ? 'orange' : 'green'"
      [bghover]="isEditMode ? 'orange' : 'green'"
      [color]="'white'"
      [colorhover]="'white'"
      [haveContent]="true"
      (clicked)="onSubmit()"
    >
      {{ isEditMode ? 'Update Analysis' : 'Create Analysis' }}
    </app-button-loading>
  </div>
</div>
