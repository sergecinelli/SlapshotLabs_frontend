@let itemsList = items();
@let currentIndexValue = currentTabIndex();
@let leftValue = indicatorLeft();
@let widthValue = indicatorWidth();

@if (itemsList.length > 0) {
  <div class="tabs-container" role="tablist">
    <div class="indicator" [style.left.px]="leftValue" [style.width.px]="widthValue"></div>
    @for (item of itemsList; track item.key; let i = $index) {
      <button
        #tabItem
        matRipple
        class="tab"
        role="tab"
        [class.active]="currentIndexValue === i"
        [attr.aria-selected]="currentIndexValue === i"
        (click)="selectTab(i)"
      >
        @if (item.icon) {
          <span class="material-symbols-rounded tab-icon">{{ item.icon }}</span>
        }
        {{ item.label }}
      </button>
    }
  </div>
}
