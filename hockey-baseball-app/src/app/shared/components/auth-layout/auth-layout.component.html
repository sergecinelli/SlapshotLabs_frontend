@let titleTextValue = titleText();

<div class="auth-wrapper">
  <!-- Left: Hero panel -->
  <div class="hero-panel">
    <img src="assets/login-image.jpg" alt="" class="hero-image" />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <img src="assets/logo-circle-white.png" alt="Slapshot Labs" class="hero-logo" />
      <h1 class="hero-brand">SLAPSHOT LABS</h1>
      <h2 class="hero-tagline">ANALYTICS. GAMES. PERFORMANCE.</h2>
      <div class="hero-stats">
        <div class="stat">
          <span class="stat-value">50+</span>
          <span class="stat-label">Stats Tracked</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-value">TEAMS</span>
          <span class="stat-label">Rosters & Profiles</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-value">LIVE</span>
          <span class="stat-label">Game Dashboard</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Content panel -->
  <div class="content-panel">
    @if (titleTextValue) {
      <div class="form-content">
        <div class="form-header">
          <img src="assets/logo.png" alt="Slapshot Labs" class="form-logo" />
          <h1 class="form-title">{{ titleTextValue }}</h1>
          <div class="title-divider"></div>
        </div>

        <ng-content></ng-content>
      </div>
    } @else {
      <ng-content select="[card]"></ng-content>
    }
  </div>
</div>
